<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Loja — King's Club Barbearia</title>
  <meta name="description" content="A loja online da King's Club Barbearia — em breve." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0A0A0A;
      --surface: #1B1B1B;
      --gold: #C9A55E;
      --gold-hi: #E6C982;
      --text: #F2EFE5;
      --muted: #968F84;
      --line: rgba(201, 165, 94, 0.30);
      --display: "Montserrat", system-ui, sans-serif;
      --sans: "Plus Jakarta Sans", system-ui, sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg); color: var(--text);
      font-family: var(--sans); font-weight: 300; line-height: 1.6;
      min-height: 100vh; display: flex; flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }
    a { color: inherit; text-decoration: none; }

    .nav {
      padding: 22px 32px; display: flex; justify-content: space-between; align-items: center;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .brand { display: flex; align-items: center; gap: 12px; }
    .brand img { width: 42px; height: 42px; border-radius: 50%; object-fit: cover; border: 1px solid var(--line); }
    .brand-text { font-family: var(--display); font-weight: 700; font-size: 14px; text-transform: uppercase; letter-spacing: 0.04em; line-height: 1.1; }
    .brand-text small { display: block; font-size: 8.5px; color: var(--gold); letter-spacing: 0.36em; margin-top: 3px; font-weight: 500; }
    .back {
      font-family: var(--display); font-weight: 500; font-size: 11px;
      text-transform: uppercase; letter-spacing: 0.22em; color: var(--muted);
      transition: color .25s ease;
    }
    .back:hover { color: var(--text); }

    main {
      flex: 1; display: grid; place-items: center; text-align: center; padding: 60px 24px;
    }
    .inner { max-width: 620px; }
    .eyebrow {
      font-family: var(--display); font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.28em; font-size: 11px;
      color: var(--gold); margin-bottom: 28px;
      display: inline-flex; align-items: center; gap: 12px;
    }
    .eyebrow::before {
      content: ""; width: 7px; height: 7px; background: var(--gold);
      transform: rotate(45deg);
    }
    h1 {
      font-family: var(--display); font-weight: 700;
      text-transform: uppercase; letter-spacing: -0.015em;
      font-size: clamp(44px, 7vw, 92px); line-height: 1.04;
      margin-bottom: 28px;
    }
    h1 em { font-style: normal; color: var(--gold); }
    p.lede {
      font-size: 17px; line-height: 1.7; color: var(--muted); max-width: 480px; margin: 0 auto 40px;
    }

    .btn {
      display: inline-flex; align-items: center; gap: 11px;
      padding: 16px 32px; border-radius: 3px;
      background: linear-gradient(135deg, var(--gold), var(--gold-hi));
      color: #14110A; font-family: var(--display); font-weight: 600;
      font-size: 11px; text-transform: uppercase; letter-spacing: 0.18em;
      border: 1px solid transparent;
      transition: all .3s cubic-bezier(.2,.6,.2,1);
    }
    .btn:hover { filter: brightness(1.07); transform: translateY(-2px); }
    .btn .arr { width: 14px; height: 1px; background: currentColor; position: relative; transform: rotate(180deg); }
    .btn .arr::after { content: ""; position: absolute; right: 0; top: -3px; width: 6px; height: 6px; border-top: 1px solid currentColor; border-right: 1px solid currentColor; transform: rotate(45deg); }

    footer {
      padding: 22px 32px; text-align: center; color: rgba(255,255,255,0.3);
      font-size: 11px; letter-spacing: 0.06em;
      border-top: 1px solid rgba(255,255,255,0.06);
    }

    @media (max-width: 600px) {
      .nav { padding: 18px 22px; }
      .brand-text { font-size: 13px; }
      main { padding: 48px 22px; }
    }
  </style>
</head>
<body>
  <nav class="nav">
    <a class="brand" href="../">
      <img src="../v1-luxury-royal/assets/logo.jpg" alt="King's Club Barbearia" />
      <span class="brand-text">King's Club<small>Barbearia</small></span>
    </a>
    <a class="back" href="../">← Voltar</a>
  </nav>

  <main>
    <div class="inner">
      <span class="eyebrow">A loja</span>
      <h1>Em <em>breve</em>.</h1>
      <p class="lede">Estamos a preparar a loja online da King's Club. Em breve poderás levar a barbearia para casa — produtos selecionados pelos nossos mestres.</p>
      <a href="../" class="btn"><span class="arr"></span> Voltar à página principal</a>
    </div>
  </main>

  <footer>© 2026 King's Club Barbearia · Loja em construção</footer>
</body>
</html>
